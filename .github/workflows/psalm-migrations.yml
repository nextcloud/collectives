name: Static analysis of migrations with latest release

on: pull_request

concurrency:
  group: psalm-migrations-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_NAME: ${{ github.event.repository.name }}
  BRANCH: ${{ github.head_ref || github.ref_name }}

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    name: static-psalm-analysis-migrations
    steps:
      - name: Get collectives app from app store
        id: collectives_app
        uses: nextcloud/appstore-action@44639c5dea0995197cb2b2d987b66e2cdc8821ae # v1.0.2
        with:
          appid: collectives

      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: 'v${{ steps.collectives_app.outputs.version }}'
          persist-credentials: false

      - name: Checkout migrations from this branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: tmp
          sparse-checkout: lib/Migration

      - name: Copy over migrations
        run: |
          rm -rf lib/Migration
          cp tmp/lib/Migration lib/Migration -r
          rm -rf tmp

      - name: Git status
        run: |
          git status

      - name: Get php version
        id: versions
        uses: icewind1991/nextcloud-version-matrix@8a7bac6300b2f0f3100088b297995a229558ddba # v1.3.2.3.1.3.2

      - name: Check enforcement of minimum PHP version ${{ steps.versions.outputs.php-min }} in psalm.xml
        run: grep 'phpVersion="${{ steps.versions.outputs.php-min }}' psalm.xml

      - name: Set up php${{ steps.versions.outputs.php-available }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ steps.versions.outputs.php-available }}
          extensions: bz2, ctype, curl, dom, fileinfo, gd, iconv, intl, json, libxml, mbstring, openssl, pcntl, posix, session, simplexml, xmlreader, xmlwriter, zip, zlib, sqlite, pdo_sqlite
          coverage: none
          ini-file: development
          # Temporary workaround for missing pcntl_* in PHP 8.3
          ini-values: disable_functions=
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          composer remove nextcloud/ocp --dev
          composer i

      - name: Install nextcloud/ocp
        run: composer require --dev nextcloud/ocp:dev-${{ steps.versions.outputs.branches-max }} --ignore-platform-reqs --with-dependencies

      - name: Run coding standards check
        run: composer run psalm -- --threads=1 --monochrome --no-progress --output-format=github
