<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
	<style>
		:root { color-scheme: light dark; --accent: #0082c9; --border: #e0e0e0; --muted: #767676; }
		* { box-sizing: border-box; }
		body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #222; background: #fff; }
		a { color: var(--accent); text-decoration: none; }
		a:hover { text-decoration: underline; }
		.site-header { padding: 12px 20px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 1.1rem; }
		.layout { display: flex; align-items: flex-start; max-width: 1200px; margin: 0 auto; }
		.sidebar { flex: 0 0 260px; padding: 20px; border-right: 1px solid var(--border); position: sticky; top: 0; align-self: flex-start; max-height: 100vh; overflow-y: auto; }
		.sidebar ul { list-style: none; margin: 0; padding-left: 14px; }
		.sidebar > ul { padding-left: 0; }
		.sidebar li { margin: 2px 0; }
		.content { flex: 1 1 auto; padding: 24px 32px; min-width: 0; }
		.content img { max-width: 100%; height: auto; }
		.content pre { background: #f5f5f5; padding: 12px; overflow-x: auto; border-radius: 6px; }
		.content code { background: #f5f5f5; padding: 0.1em 0.3em; border-radius: 4px; }
		.content pre code { background: none; padding: 0; }
		.content table { border-collapse: collapse; }
		.content th, .content td { border: 1px solid var(--border); padding: 6px 10px; }
		.content blockquote { border-left: 3px solid var(--border); margin-left: 0; padding-left: 14px; color: var(--muted); }
		@media (max-width: 800px) {
			.layout { flex-direction: column; }
			.sidebar { position: static; max-height: none; border-right: none; border-bottom: 1px solid var(--border); flex-basis: auto; width: 100%; }
		}
	</style>
</head>
<body>
	<header class="site-header"><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></header>
	<div class="layout">
		<nav class="sidebar">{{ partial "tree.html" .Site.Home }}</nav>
		<main class="content">{{ block "main" . }}{{ end }}</main>
	</div>
</body>
</html>
